<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>YouTube 連続再生プレイヤー</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 16px;
      background: #f5f5f5;
    }

    /* ★ フル画面対応 */
    #player {
      width: 100%;
      aspect-ratio: 16 / 9; /* 画面幅に応じて高さが決まる */
      margin-bottom: 16px;
    }

    ul {
      padding-left: 1.2em;
    }
    li.playing {
      font-weight: bold;
      color: #d32f2f;
    }
  </style>
</head>
<body>
  <h1>YouTube 連続再生プレイヤー</h1>
  <div id="player"></div>

  <h2>再生リスト</h2>
  <ul id="video-list">
    <li>1. 傘のポーズ</li>
    <li>2. Ｋのポーズ</li>
    <li>3. 大仏のポーズ</li>
    <li>4. シェーのポーズ</li>
    <li>5. 飛び込みのポーズ</li>
  </ul>

  <script>
    const videoList = [
      "rnPisRvCa3A",
      "-nYDBJ4z-fY",
      "3WZbUs-mtMg",
      "nZQY-FplreA",
      "kqVe0NY4WdQ"
    ];

    let index = 0;
    let player = null;

    function updateListHighlight() {
      const list = document.querySelectorAll("#video-list li");
      list.forEach((li, i) => {
        li.classList.toggle("playing", i === index);
      });
    }

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: videoList[index],
        playerVars: {
          autoplay: 1,
          rel: 0
        },
        events: {
          onReady: () => updateListHighlight(),
          onStateChange: onPlayerStateChange
        }
      });
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        index++;
        if (index < videoList.length) {
          player.loadVideoById(videoList[index]);
          updateListHighlight();
        } else {
          console.log("全動画の再生が終了しました");
        }
      }
    }

    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
    window.onPlayerStateChange = onPlayerStateChange;
  </script>
</body>
</html>
